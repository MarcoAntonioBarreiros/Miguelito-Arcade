name: Run temporary Miguelito fix

on:
  push:
    branches:
      - fix/samsung-timing-bacillus-controls
    paths:
      - '.github/fix-trigger'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/samsung-timing-bacillus-controls
      - name: Apply patch
        run: python .github/scripts/apply_timing_fix.py
      - name: Check JavaScript syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          script = re.search(r'<script>(.*?)</script>', html, re.S).group(1)
          Path('/tmp/miguelito-game.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/miguelito-game.js
      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Fix Samsung timing, Bacillus bounds and mobile controls"
          git push origin HEAD:fix/samsung-timing-bacillus-controls