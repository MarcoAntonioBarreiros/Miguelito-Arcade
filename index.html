<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Demo da Rizosfera Mobile</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a; 
            color: white;
            font-family: sans-serif;
            flex-direction: column;
            overflow: hidden; 
        }
        
        canvas {
            border: 4px solid #3a5a6b;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            
            /* Ocupa 100% do espaço livre, já que o texto agora é flutuante */
            max-height: 100vh; 
            max-width: 100vw;  
            width: auto;      
            
            touch-action: none; 
        }
        
        .instrucoes {
            position: absolute; /* Interface Flutuante (HUD) */
            bottom: 20px; 
            left: 50%;
            transform: translateX(-50%); 
            
            background-color: rgba(0, 0, 0, 0.6); 
            padding: 10px 20px;
            border-radius: 20px; 
            font-size: 14px;
            text-align: center;
            z-index: 10;
            
            /* Permite arrastar o dedo por cima do texto sem perder o controle */
            pointer-events: none; 
        }
        
        @media (max-width: 600px) {
            .instrucoes span.pc { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="jogoCanvas" width="960" height="1080"></canvas>
    
    <div class="instrucoes">
        <b>Mobile:</b> Arraste para andar. Toque para pular.<br>
        <span class="pc"><b>PC:</b> Setas para andar. Espaço para pular.</span>
    </div>

    <script>
        const canvas = document.getElementById('jogoCanvas');
        const ctx = canvas.getContext('2d');

        // ==========================================
        // 1. CARREGAMENTO DAS IMAGENS
        // ==========================================
        const imgFundo = new Image();
        imgFundo.src = 'cenario.jpeg'; 

        const imgAndando = new Image();
        imgAndando.src = 'personagem_sprite.png'; 
        
        const imgParado = new Image();
        imgParado.src = 'miguelito_idle.png'; // NOVA ANIMAÇÃO IDLE

        const imgPulando = new Image();
        imgPulando.src = 'personagem_jumping.png'; 

        const imgInimigo = new Image();
        imgInimigo.src = 'wormstanding.png'; 

        const imgDano = new Image();
        imgDano.src = 'personagem_dano.png'; 

        const imgBacillus = new Image();
        imgBacillus.src = 'bacillus.png'; 

        // ==========================================
        // 2. CONFIGURAÇÕES DOS SPRITES E FÍSICA
        // ==========================================
        const configAndando = { colunas: 6, largura: 560, altura: 704 };
        const configParado  = { colunas: 6, largura: 589, altura: 740 }; // CONFIGURAÇÃO EXATA DA NOVA ARTE
        const configPulando = { colunas: 4, largura: 588, altura: 628 };
        const configInimigo = { colunas: 6, largura: 610, altura: 688 };
        const configDano    = { colunas: 7, largura: 416, altura: 740 };
        const configBacillus = { colunas: 5, largura: 732, altura: 740 };

        const escala = 0.35; 
        const escalaInimigo = 0.20; 
        const escalaBacillus = 0.25; 
        const ajusteYInimigo = 15; 
        
        let xPersonagem = 400;
        let yPersonagem = 0; 
        let nivelDoChao = 0; 

        let frameAtual = 0;
        let frameInimigoAtual = 0; 
        let frameBacillusAtual = 0; 
        let estado = 'parado'; 
        let viradoParaEsquerda = false;

        let velocidadeY = 0;
        const forcaPulo = -18; 
        const gravidade = 0.8; 
        let noChao = true;

        let isTomandoDano = false;
        let invulneravel = false;
        let tempoInvulneravel = 0;
        const duracaoInvulnerabilidade = 90; 

        let contadorFrames = 0;
        const velocidadeAnimacao = 5; 
        
        let contadorFramesBacillus = 0;
        const velocidadeAnimacaoBacillus = 15; 

        // NOVO: Relógio independente para o Miguelito respirando
        let contadorFramesParado = 0;
        const velocidadeAnimacaoParado = 12; // Aumente este número para deixar a respiração ainda mais lenta
		        
        // NOVO: Contador para a pausa entre as respirações
        let tempoPausaIdle = 0;

        // ==========================================
        // 3. SISTEMA DE ITENS E INIMIGOS
        // ==========================================
        let gotas = []; 
        let miguelitoCarregadoRoxo = false; 
        let patogenos = []; 
        let particulas = []; 
        let intensidadePulsoEscudo = 0; 
        let pgpbs = [];

        function inicializarBacillus() {
            pgpbs.push({
                x: 100, 
                yBase: 180, 
                velocidadeX: 2.5, 
                viradoParaEsquerda: false,
                tempoParaProximaGota: 120 
            });
        }
        
        function spawnGotaRoxaDoBacillus(origemX, origemY) {
            const novaGota = {
                x: origemX, 
                y: origemY, 
                raio: 15,
                velocidade: 3 + Math.random() * 2, 
                ativa: true
            };
            gotas.push(novaGota);
        }

        function spawnPatogeno() {
            let alturaRealInimigo = configInimigo.altura * escalaInimigo;
            const novoPatogeno = {
                x: canvas.width + 50, 
                y: nivelDoChao - alturaRealInimigo - ajusteYInimigo, 
                largura: configInimigo.largura * escalaInimigo,
                altura: alturaRealInimigo,
                velocidade: -1.5 - Math.random() * 1.5, 
                ativa: true
            };
            patogenos.push(novoPatogeno);
        }

        function gerarExplosao(x, y, cor) {
            for (let i = 0; i < 30; i++) {
                particulas.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 1) * 10,   
                    tamanho: Math.random() * 8 + 4, 
                    cor: cor, vida: 1.0,      
                    taxaMorte: Math.random() * 0.03 + 0.02, peso: 0.5 
                });
            }
        }

        function gerarRastro(x, y) {
            particulas.push({
                x: x + (Math.random() - 0.5) * 14, y: y + (Math.random() - 0.5) * 14,
                vx: (Math.random() - 0.5) * 1.5, vy: Math.random() * -1 - 0.5,      
                tamanho: Math.random() * 3 + 1.5, cor: '#d2b4de',                    
                vida: 0.8, taxaMorte: 0.04, peso: -0.05                        
            });
        }

        setInterval(spawnPatogeno, 4000); 

        // ==========================================
        // 4. CONTROLES (TECLADO E TOUCH MOBILE)
        // ==========================================
        const teclas = { ArrowRight: false, ArrowLeft: false, ArrowUp: false, " ": false };

        // --- Eventos de Teclado (PC) ---
        window.addEventListener('keydown', (e) => {
            if (teclas.hasOwnProperty(e.key)) teclas[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            if (teclas.hasOwnProperty(e.key)) teclas[e.key] = false;
        });

        // --- Eventos de Touch Multi-touch Corrigido (Celular e Tablet) ---
        let touchMovimentoId = null;
        let touchStartX = 0;
        let isTouchTapping = false;

        window.addEventListener('touchstart', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let touch = e.changedTouches[i];
                
                if (touchMovimentoId === null) {
                    touchMovimentoId = touch.identifier;
                    touchStartX = touch.clientX;
                    isTouchTapping = true; 
                } else {
                    teclas[" "] = true; 
                    setTimeout(() => teclas[" "] = false, 150);
                }
            }
        }, {passive: false});

        window.addEventListener('touchmove', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let touch = e.changedTouches[i];
                
                if (touch.identifier === touchMovimentoId) {
                    let deltaX = touch.clientX - touchStartX;

                    if (Math.abs(deltaX) > 15) {
                        isTouchTapping = false; 
                    }

                    if (deltaX > 20) {
                        teclas.ArrowRight = true;
                        teclas.ArrowLeft = false;
                    } else if (deltaX < -20) {
                        teclas.ArrowLeft = true;
                        teclas.ArrowRight = false;
                    } else {
                        teclas.ArrowRight = false;
                        teclas.ArrowLeft = false;
                    }
                }
            }
        }, {passive: false});

        window.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let touch = e.changedTouches[i];
                
                if (touch.identifier === touchMovimentoId) {
                    if (isTouchTapping) {
                        teclas[" "] = true; 
                        setTimeout(() => teclas[" "] = false, 150);
                    }
                    
                    teclas.ArrowRight = false;
                    teclas.ArrowLeft = false;
                    touchMovimentoId = null;
                }
            }
        }, {passive: false});

        // ==========================================
        // 5. LÓGICA DO JOGO (ATUALIZAR)
        // ==========================================
        function atualizar() {
            let configAtual = configParado; // Estado padrão atualizado
            if (estado === 'andando') configAtual = configAndando;
            if (estado === 'pulando') configAtual = configPulando;
            if (estado === 'dano') configAtual = configDano;

            let renderLarguraAtual = configAtual.largura * escala;
            let renderAlturaAtual = configAtual.altura * escala;

            if (intensidadePulsoEscudo > 0) {
                intensidadePulsoEscudo -= 0.05; 
                if (intensidadePulsoEscudo < 0) intensidadePulsoEscudo = 0;
            }

            for (let i = particulas.length - 1; i >= 0; i--) {
                let p = particulas[i];
                p.x += p.vx; p.y += p.vy; p.vy += p.peso; 
                p.vida -= p.taxaMorte; 
                if (p.vida <= 0) particulas.splice(i, 1); 
            }

            if (invulneravel) {
                tempoInvulneravel--;
                if (tempoInvulneravel <= 0) invulneravel = false;
            }

            if (!isTomandoDano) {
                if (teclas.ArrowRight) {
                    xPersonagem += 4; 
                    viradoParaEsquerda = false;
                    if (noChao) estado = 'andando';
                } else if (teclas.ArrowLeft) {
                    xPersonagem -= 4; 
                    viradoParaEsquerda = true;
                    if (noChao) estado = 'andando';
                } else {
                    if (noChao) estado = 'parado';
                }

                if ((teclas.ArrowUp || teclas[" "]) && noChao) {
                    velocidadeY = forcaPulo;
                    noChao = false;
                    estado = 'pulando';
                    frameAtual = 0; 
                }
            } else {
                xPersonagem -= (viradoParaEsquerda ? -2 : 2); 
            }

            if (xPersonagem < -50) xPersonagem = -50;
            if (xPersonagem > canvas.width - renderLarguraAtual + 50) xPersonagem = canvas.width - renderLarguraAtual + 50;

            yPersonagem += velocidadeY;
            if (!noChao) {
                velocidadeY += gravidade; 
                if (!isTomandoDano) estado = 'pulando';
            }

            // Garante que o Miguelito sempre alinhe os pés com o chão, independentemente do tamanho do sprite atual
            if (yPersonagem >= nivelDoChao - renderAlturaAtual) {
                yPersonagem = nivelDoChao - renderAlturaAtual;
                velocidadeY = 0;
                noChao = true;
                
                if (isTomandoDano) {
                    isTomandoDano = false;
                    estado = 'parado';
                } else if (!teclas.ArrowLeft && !teclas.ArrowRight) {
                    estado = 'parado';
                }
            }

            for (let i = 0; i < pgpbs.length; i++) {
                let bac = pgpbs[i];
                
                bac.x += bac.velocidadeX;
                let larguraRenderizadaBacillus = configBacillus.largura * escalaBacillus;
                
                if (bac.x <= 20 || bac.x >= canvas.width - larguraRenderizadaBacillus - 20) {
                    bac.velocidadeX *= -1; 
                    bac.viradoParaEsquerda = bac.velocidadeX < 0;
                }

                bac.yAtual = bac.yBase + Math.sin(Date.now() / 300) * 20; 

                bac.tempoParaProximaGota--;
                if (bac.tempoParaProximaGota <= 0) {
                    spawnGotaRoxaDoBacillus(bac.x + larguraRenderizadaBacillus / 2, bac.yAtual + (configBacillus.altura * escalaBacillus) * 0.8);
                    bac.tempoParaProximaGota = 150 + Math.random() * 90; 
                }
            }

            // Animação Independente (Miguelito Parado / Respirando)
            if (estado === 'parado') {
                if (tempoPausaIdle > 0) {
                    // Se estiver no tempo de pausa, diminui o cronômetro e trava no primeiro quadro (pose inicial)
                    tempoPausaIdle--;
                    frameAtual = 0; 
                } else {
                    contadorFramesParado++;
                    if (contadorFramesParado >= velocidadeAnimacaoParado) {
                        frameAtual++;
                        
                        // Se a animação chegou ao último quadro da imagem
                        if (frameAtual >= configParado.colunas) {
                            frameAtual = 0; // Volta para o início
                            // Sorteia uma pausa entre 60 e 120 quadros (1 a 2 segundos a 60FPS)
                            tempoPausaIdle = 30 + Math.floor(Math.random() * 30); 
                        }
                        contadorFramesParado = 0;
                    }
                }
            } else {
                // Reseta a pausa imediatamente caso o jogador ande ou pule
                tempoPausaIdle = 0; 

                // Animação Principal (Miguelito Correndo, Pulando e Inimigos)
                contadorFrames++;
                if (contadorFrames >= velocidadeAnimacao) {
                    if (estado === 'andando') {
                        frameAtual = (frameAtual + 1) % configAndando.colunas;
                    } else if (estado === 'pulando' || estado === 'dano') {
                        if (frameAtual < configAtual.colunas - 1) frameAtual++;
                    }
                    
                    frameInimigoAtual = (frameInimigoAtual + 1) % configInimigo.colunas;
                    contadorFrames = 0;
                }
            }

            // Animação Independente (Bacillus flutuando lentamente)
            contadorFramesBacillus++;
            if (contadorFramesBacillus >= velocidadeAnimacaoBacillus) {
                frameBacillusAtual = (frameBacillusAtual + 1) % configBacillus.colunas;
                contadorFramesBacillus = 0;
            }

            let centroMiguelitoX = xPersonagem + (renderLarguraAtual / 2);
            let centroMiguelitoY = yPersonagem + (renderAlturaAtual / 2);

            for (let i = 0; i < gotas.length; i++) {
                let gota = gotas[i];
                if (gota.ativa) {
                    gota.y += gota.velocidade; 
                    
                    if (Math.random() > 0.3) gerarRastro(gota.x, gota.y);

                    let distX = centroMiguelitoX - gota.x;
                    let distY = centroMiguelitoY - gota.y;
                    
                    if (Math.sqrt((distX * distX) + (distY * distY)) < 70) { 
                        gota.ativa = false; 
                        miguelitoCarregadoRoxo = true; 
                    }
                    if (gota.y > canvas.height + 50) gota.ativa = false;
                }
            }

            let mHitboxWidth = renderLarguraAtual * 0.4;    
            let mHitboxHeight = renderAlturaAtual * 0.85;   
            let mHitboxX = xPersonagem + (renderLarguraAtual - mHitboxWidth) / 2;
            let mHitboxY = yPersonagem + (renderAlturaAtual - mHitboxHeight); 

            for (let i = 0; i < patogenos.length; i++) {
                let pat = patogenos[i];
                if (pat.ativa) {
                    pat.x += pat.velocidade; 

                    let pHitboxWidth = pat.largura * 0.5;
                    let pHitboxHeight = pat.altura * 0.55; 
                    let pHitboxX = pat.x + (pat.largura - pHitboxWidth) / 2;
                    let pHitboxY = pat.y + (pat.altura - pHitboxHeight);

                    if (!isTomandoDano && !invulneravel && 
                        mHitboxX < pHitboxX + pHitboxWidth &&
                        mHitboxX + mHitboxWidth > pHitboxX &&
                        mHitboxY < pHitboxY + pHitboxHeight &&
                        mHitboxY + mHitboxHeight > pHitboxY) {
                        
                        if (miguelitoCarregadoRoxo) {
                            pat.ativa = false;
                            miguelitoCarregadoRoxo = false; 
                            intensidadePulsoEscudo = 1.0; 
                            gerarExplosao(pHitboxX + pHitboxWidth / 2, pHitboxY + pHitboxHeight / 2, '#a67c52'); 
                            
                        } else {
                            isTomandoDano = true;
                            invulneravel = true;
                            tempoInvulneravel = duracaoInvulnerabilidade;
                            estado = 'dano';
                            frameAtual = 0;
                            yPersonagem -= ((configDano.altura - configAtual.altura) * escala);
                            velocidadeY = -12; 
                            noChao = false;
                        }
                    }
                    if (pat.x < -100) pat.ativa = false;
                }
            }
        }

        // ==========================================
        // 6. DESENHO NA TELA
        // ==========================================
        function desenhar() {
            ctx.drawImage(imgFundo, 0, 0, canvas.width, canvas.height);

            for (let i = 0; i < pgpbs.length; i++) {
                let bac = pgpbs[i];
                let renderLarguraBacillus = configBacillus.largura * escalaBacillus;
                let renderAlturaBacillus = configBacillus.altura * escalaBacillus;
                const recorteXBacillus = frameBacillusAtual * configBacillus.largura;

                ctx.save();
                if (bac.viradoParaEsquerda) { 
                    ctx.translate(bac.x + renderLarguraBacillus, bac.yAtual);
                    ctx.scale(-1, 1);
                    ctx.drawImage(imgBacillus, recorteXBacillus, 0, configBacillus.largura, configBacillus.altura, 0, 0, renderLarguraBacillus, renderAlturaBacillus);
                } else {
                    ctx.drawImage(imgBacillus, recorteXBacillus, 0, configBacillus.largura, configBacillus.altura, bac.x, bac.yAtual, renderLarguraBacillus, renderAlturaBacillus);
                }
                ctx.restore();
            }

            for (let i = 0; i < particulas.length; i++) {
                let p = particulas[i];
                ctx.globalAlpha = p.vida; 
                ctx.fillStyle = p.cor;
                if (p.peso < 0) {
                    ctx.shadowColor = p.cor; ctx.shadowBlur = 5;
                } else {
                    ctx.shadowBlur = 0; 
                }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.tamanho, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0; 
            }
            ctx.globalAlpha = 1.0; 

            for (let i = 0; i < patogenos.length; i++) {
                let pat = patogenos[i];
                if (pat.ativa) {
                    const recorteXinimigo = frameInimigoAtual * configInimigo.largura;
                    ctx.save();
                    ctx.translate(pat.x + pat.largura, pat.y);
                    ctx.scale(-1, 1);
                    ctx.drawImage(imgInimigo, recorteXinimigo, 0, configInimigo.largura, configInimigo.altura, 0, 0, pat.largura, pat.altura);
                    ctx.restore();
                }
            }

            for (let i = 0; i < gotas.length; i++) {
                let gota = gotas[i];
                if (gota.ativa) {
                    ctx.save(); 
                    ctx.shadowColor = '#d2b4de'; ctx.shadowBlur = 20;         
                    let gradiente = ctx.createRadialGradient(gota.x - 3, gota.y - 3, 1, gota.x, gota.y, gota.raio);
                    gradiente.addColorStop(0, 'rgba(235, 222, 240, 0.9)'); 
                    gradiente.addColorStop(0.7, 'rgba(155, 89, 182, 0.8)'); 
                    gradiente.addColorStop(1, 'rgba(118, 68, 138, 0.5)'); 
                    ctx.beginPath();
                    ctx.arc(gota.x, gota.y, gota.raio, 0, Math.PI * 2);
                    ctx.fillStyle = gradiente; ctx.fill();
                    ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)'; ctx.stroke();
                    ctx.restore();
                }
            }

            ctx.save();
            let imagemAtual = imgParado;
            let configAtual = configParado;
            
            if (estado === 'andando') {
                imagemAtual = imgAndando; configAtual = configAndando;
            } else if (estado === 'pulando') {
                imagemAtual = imgPulando; configAtual = configPulando;
            } else if (estado === 'dano') {
                imagemAtual = imgDano; configAtual = configDano;
            }

            let renderLargura = configAtual.largura * escala;
            let renderAltura = configAtual.altura * escala;
            const recorteX = frameAtual * configAtual.largura;
            const recorteY = 0; 

            let centroX = xPersonagem + renderLargura / 2;
            let centroY = yPersonagem + renderAltura / 2;
            
            if (intensidadePulsoEscudo > 0) {
                let raioPulso = 50 + (1 - intensidadePulsoEscudo) * 150; 
                ctx.beginPath();
                ctx.arc(centroX, centroY, raioPulso, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(155, 89, 182, ${intensidadePulsoEscudo})`; 
                ctx.lineWidth = 15 * intensidadePulsoEscudo;
                ctx.stroke();
            }

            if (invulneravel && !isTomandoDano) {
                if (Math.floor(tempoInvulneravel / 5) % 2 === 0) ctx.globalAlpha = 0.4; 
            } else {
                ctx.globalAlpha = 1.0; 
            }

            if (miguelitoCarregadoRoxo && estado !== 'dano') {
                ctx.shadowColor = '#9b59b6'; ctx.shadowBlur = 40;
            }

            if (viradoParaEsquerda) {
                ctx.translate(xPersonagem + renderLargura, yPersonagem);
                ctx.scale(-1, 1);
                ctx.drawImage(imagemAtual, recorteX, recorteY, configAtual.largura, configAtual.altura, 0, 0, renderLargura, renderAltura);
            } else {
                ctx.drawImage(imagemAtual, recorteX, recorteY, configAtual.largura, configAtual.altura, xPersonagem, yPersonagem, renderLargura, renderAltura);
            }

            ctx.restore();
        }

        function loopDoJogo() {
            atualizar();
            desenhar();
            requestAnimationFrame(loopDoJogo);
        }

        // ==========================================
        // 7. INICIALIZAÇÃO
        // ==========================================
        let imagensCarregadas = 0;
        function checarCarregamento() {
            imagensCarregadas++;
            if (imagensCarregadas === 7) { // Agora aguardamos 7 imagens serem lidas!
                nivelDoChao = canvas.height - 60; 
                yPersonagem = nivelDoChao - (configParado.altura * escala);
                
                inicializarBacillus(); 
                
                loopDoJogo();
            }
        }

        imgFundo.onload = checarCarregamento;
        imgAndando.onload = checarCarregamento;
        imgParado.onload = checarCarregamento; // Callback da nova arte
        imgPulando.onload = checarCarregamento;
        imgInimigo.onload = checarCarregamento;
        imgDano.onload = checarCarregamento;
        imgBacillus.onload = checarCarregamento;
        
    </script>
</body>
</html>
